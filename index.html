<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ressource éducative libre (REL) | Partager ou ne pas partager</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Force la compilation JSX en mode "classique" (React.createElement) :
    // évite l'injection d'un import vers react/jsx-runtime, incompatible avec
    // le React chargé par CDN. Sans cela : "Cannot use import statement..." -> page blanche.
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>
</head>
<body>
  <!-- A. Lez, juin 2026 - Version 1 -->
  <div id="root"></div>
  <script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef } = React;

const THEMES = {
  potentiel: { id: 'potentiel', title: "Potentiel de réutilisation", desc: "Plus vous cochez, plus la ressource gagne en valeur partagée. Rien n'est obligatoire.", items: [
      { id: 'p1', label: "Adaptation rapide possible par un tiers." },
      { id: 'p2', label: "Apporte une réelle nouveauté (outil, méthode, donnée)." },
      { id: 'p3', label: "Le contenu est durable dans le temps." },
      { id: 'p4', label: "Fichiers sources dans des formats ouverts/répandus." }
  ]},
  qualite: { id: 'qualite', title: "Qualité", desc: "Le niveau de finition attendu dépend de l'usage visé.", items: [
      { id: 'q1', label: "Relecture critique effectuée par un(e) pair." },
      { id: 'q2', label: "Ressource aboutie et utile en l'état." },
      { id: 'q3', label: "Versionnage prévu pour les mises à jour." },
      { id: 'q4', label: <>Respect des <a href="https://zenodo.org/records/14963025" target="_blank" rel="noopener noreferrer">Balises éditoriales du SSF</a>.</> }
  ]},
  rayon: { id: 'rayon', title: "Rayonnement", desc: "Ce que le partage fait gagner, au-delà de la ressource elle-même.", items: [
      { id: 'r1', label: "Contribue à la réputation de l'auteur et de l'UdeS." },
      { id: 'r2', label: "Inspire plus largement la communauté éducative." }
  ]}
};

const LEGAL_ITEMS = [
  { id: 'droit', label: "Propriété intellectuelle", desc: <>Respecte la Loi canadienne sur le droit d'auteur et la <a href="https://www.usherbrooke.ca/decouvrir/fileadmin/sites/decouvrir/documents/direction/politiques/2500-049.pdf" target="_blank" rel="noopener noreferrer">Politique sur la propriété intellectuelle</a> de l'UdeS.</> },
  { id: 'licence', label: "Compatibilité des licences", desc: "Les contenus tiers intégrés permettent la diffusion sous CC BY." },
  { id: 'ethique', label: "Éthique et sensibilité", desc: "Absence de données sensibles ou enjeux validés." },
  { id: 'consent', label: "Consentements", desc: "Obtenus pour les collaborations ou captations." }
];

const LICENSES = {
  'BY': { full: 'Attribution 4.0 International', code: 'by', reco: true, allows: "Réutilisation totale, y compris commerciale, si l'auteur est crédité." },
  'BY-SA': { full: 'Attribution – Partage dans les mêmes conditions 4.0', code: 'by-sa', reco: true, allows: "Les œuvres dérivées doivent obligatoirement porter cette même licence." },
  'BY-NC': { full: 'Attribution – Pas d’utilisation commerciale 4.0', code: 'by-nc', reco: false, allows: "L'usage commercial est strictement interdit." },
  'BY-NC-SA': { full: 'Attribution – Non commercial – Partage identique 4.0', code: 'by-nc-sa', reco: false, allows: "Pas d'usage commercial, les dérivés sous même licence." },
  'BY-ND': { full: 'Attribution – Pas de modification 4.0', code: 'by-nd', reco: false, allows: "L'œuvre doit être partagée telle quelle, sans aucune adaptation." },
  'BY-NC-ND': { full: 'Attribution – Non commercial – Non dérivé 4.0', code: 'by-nc-nd', reco: false, allows: "La plus stricte : ni modification, ni commercialisation." }
};

const deedUrl = (code) => `https://creativecommons.org/licenses/${code}/4.0/deed.fr`;
// Badge officiel en PNG. Pour une fiabilité maximale au déploiement, vous pouvez
// héberger les 6 PNG dans votre dépôt et remplacer cette base par un chemin local
// (ex. `/badges/${code}.png`) : même origine = intégration garantie à la copie.
const badgeUrl = (code) => `https://licensebuttons.net/l/${code}/4.0/88x31.png`;
const escHtml = (s) => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
// Séparateur après un segment de citation : un point + espace, sauf si le segment
// se termine déjà par un point (évite « M.. » -> « M. »).
const endDot = (s) => (String(s).trim().endsWith('.') ? ' ' : '. ');

function App() {
  const [isLoaded, setIsLoaded] = useState(false);
  const [checks, setChecks] = useState({});
  const [legal, setLegal] = useState({ droit: null, licence: null, ethique: null, consent: null });
  const [verdictStatus, setVerdictStatus] = useState('neutral');

  // 'adapt' est fixé à 'oui' (l'adaptation reste permise, conforme à l'esprit REL) :
  // la question correspondante a été retirée du parcours.
  const [ans, setAns] = useState({ rights: null, adapt: 'oui', sa: null, nc: null });
  const [meta, setMeta] = useState({ title: '', author: '', faculte: '', etablissement: '', year: new Date().getFullYear().toString() });
  const [copied, setCopied] = useState(false);
  const [logoOk, setLogoOk] = useState(true);

  const part2Ref = useRef(null);
  const sideRef = useRef(null);
  const copyAreaRef = useRef(null);

  useEffect(() => {
    const urls = [
      'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;450;500;600;700&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css',
      'https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css'
    ];
    const links = urls.map(href => {
      const l = document.createElement('link');
      l.rel = 'stylesheet'; l.href = href;
      document.head.appendChild(l);
      return l;
    });
    const t = setTimeout(() => setIsLoaded(true), 380);
    return () => { clearTimeout(t); links.forEach(l => { try { document.head.removeChild(l); } catch (e) {} }); };
  }, []);

  const toggleCheck = (id) => setChecks(prev => ({ ...prev, [id]: !prev[id] }));
  const setLegalItem = (id, val) => setLegal(prev => ({ ...prev, [id]: val }));

  useEffect(() => {
    const vals = Object.values(legal);
    const touched = vals.some(v => v !== null) || Object.values(checks).some(v => v);
    const concern = vals.some(v => v === 'non' || v === 'verifier');
    const allOui = vals.every(v => v === 'oui');
    const count = (themeId) => THEMES[themeId].items.filter(i => checks[i.id]).length;
    if (!touched) setVerdictStatus('neutral');
    else if (concern) setVerdictStatus('red');
    else if (!allOui) setVerdictStatus('yellow');
    else if (count('qualite') >= 2 && count('potentiel') >= 1) setVerdictStatus('green');
    else setVerdictStatus('yellow');
  }, [checks, legal]);

  const legalOui = LEGAL_ITEMS.filter(i => legal[i.id] === 'oui').length;
  const legalConcern = LEGAL_ITEMS.some(i => legal[i.id] === 'non' || legal[i.id] === 'verifier');
  const legalClear = legalOui === LEGAL_ITEMS.length;
  // L'étape 2 (choix de licence) se déverrouille une fois les aspects légaux réglés
  // ET la dernière option de Rayonnement cochée (fin de l'évaluation).
  const rayonLastId = THEMES.rayon.items[THEMES.rayon.items.length - 1].id;
  const step2Ready = legalClear && !!checks[rayonLastId];

  const verdictData = {
    neutral: { icon: 'bi-compass', title: 'Aide à la décision', msg: 'Renseignez le formulaire pour évaluer votre ressource.', color: 'var(--ink-soft)' },
    red: { icon: 'bi-sign-stop', title: 'Arrêt requis', msg: 'Un aspect légal bloque le partage. Validez ces points avec la direction.', color: 'var(--stop)' },
    yellow: { icon: 'bi-hourglass-split', title: 'Attention', msg: 'Complétez les aspects légaux (tout « Oui »), ou améliorez la qualité de la ressource.', color: 'var(--gold-deep)' },
    green: { icon: 'bi-check2-circle', title: 'Feu vert', msg: "Aspects légaux respectés et ressource solide. Vous pouvez passer à l'étape 2.", color: 'var(--green-text)' }
  }[verdictStatus];

  const handleAns = (q, val) => setAns(prev => {
    const next = { ...prev, [q]: val };
    if (q === 'adapt' && val === 'non') next.sa = null;
    return next;
  });

  const computeLicense = () => {
    if (ans.adapt === 'non') return ans.nc === 'oui' ? 'BY-NC-ND' : 'BY-ND';
    if (ans.adapt === 'oui') {
      if (ans.nc === 'oui' && ans.sa === 'oui') return 'BY-NC-SA';
      if (ans.nc === 'oui') return 'BY-NC';
      if (ans.sa === 'oui') return 'BY-SA';
      return 'BY';
    }
    return null;
  };

  const isPart2Ready = () => ans.rights && ans.adapt && ans.nc !== null && (ans.adapt === 'non' || ans.sa !== null);
  const licenseCode = computeLicense();
  const licInfo = licenseCode ? LICENSES[licenseCode] : null;
  const showLicense = step2Ready && isPart2Ready() && licInfo;

  const resetAll = () => {
    setChecks({});
    setLegal({ droit: null, licence: null, ethique: null, consent: null });
    setAns({ rights: null, adapt: 'oui', sa: null, nc: null });
    setMeta(m => ({ ...m, title: '', author: '', faculte: '', etablissement: '' }));
    setCopied(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Rattachement institutionnel (Établissement, puis Centre/Faculté), tous deux
  // facultatifs : seuls les champs remplis apparaissent.
  const affiliation = () => {
    const parts = [];
    if (meta.etablissement.trim()) parts.push(meta.etablissement.trim());
    if (meta.faculte.trim()) parts.push(meta.faculte.trim());
    return parts.join(', ');
  };

  // Construit la mention (HTML + texte) à partir de l'état courant.
  const buildMention = (logoHtml) => {
    const t = meta.title.trim() || '[Titre]';
    const a = meta.author.trim() || '[Auteur]';
    const y = meta.year.trim() || '[Année]';
    const affil = affiliation();
    const url = deedUrl(licInfo.code);
    const ccLabel = `CC ${licenseCode} 4.0`;

    const citationText = `${a}${endDot(a)}(${y}). ${t}${endDot(t)}${affil ? affil + endDot(affil) : ''}Sous licence ${ccLabel}.`;
    const text = `Pour citer cette ressource :\n${citationText} ${url}`;

    const citationHtml = `${escHtml(a)}${endDot(a)}(${escHtml(y)}). <em>${escHtml(t)}</em>${endDot(t)}${affil ? escHtml(affil) + endDot(affil) : ''}Sous licence <a href="${url}">${ccLabel}</a>.`;
    let html = `<p style="font-family:Georgia,serif;font-size:13.5px;color:#333;margin:0 0 6px">Pour citer cette ressource :</p>`;
    if (logoHtml) {
      // Tableau : badge à gauche, citation à droite (colle proprement dans Word/courriel).
      html += `<table style="border-collapse:collapse;margin:0"><tr><td style="vertical-align:top;padding:2px 10px 0 0">${logoHtml}</td><td style="vertical-align:top;font-family:Georgia,serif;font-size:13.5px;color:#333;line-height:1.55">${citationHtml}</td></tr></table>`;
    } else {
      html += `<p style="font-family:Georgia,serif;font-size:13.5px;color:#333;line-height:1.55;margin:0">${citationHtml}</p>`;
    }
    return { html, text };
  };

  const blobToDataURL = (blob) => new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });

  const copyToClipboard = async () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 3000); };

    // 1. Tente de récupérer le badge PNG et de l'intégrer en data-URI (image embarquée).
    let logoHtml = '';
    let pngBlob = null;
    if (logoOk) {
      try {
        const res = await fetch(badgeUrl(licInfo.code), { mode: 'cors' });
        if (res.ok) {
          pngBlob = await res.blob();
          const dataUri = await blobToDataURL(pngBlob);
          logoHtml = `<img src="${dataUri}" alt="Licence CC ${licenseCode}" style="height:31px;display:block">`;
        }
      } catch (e) {
        // Téléchargement bloqué (CORS/hors ligne) : on retombe sur la référence distante.
        logoHtml = `<img src="${badgeUrl(licInfo.code)}" alt="Licence CC ${licenseCode}" style="height:31px;display:block">`;
        pngBlob = null;
      }
    }

    const { html, text } = buildMention(logoHtml);

    // 2. Écrit dans le presse-papiers : HTML enrichi + texte + (si dispo) image PNG.
    if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
      try {
        const types = {
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([text], { type: 'text/plain' })
        };
        if (pngBlob) types['image/png'] = pngBlob;
        await navigator.clipboard.write([new ClipboardItem(types)]);
        return done();
      } catch (e) { /* repli ci-dessous */ }
    }

    // 3. Repli : sélection visuelle de l'aperçu + execCommand.
    if (copyAreaRef.current) {
      const range = document.createRange();
      range.selectNodeContents(copyAreaRef.current);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      try { document.execCommand('copy') ? done() : alert("Sélectionnez le texte et copiez-le manuellement (Ctrl+C)."); }
      catch (e) { alert("Sélectionnez le texte et copiez-le manuellement (Ctrl+C)."); }
      sel.removeAllRanges();
    }
  };

  if (!isLoaded) return <div className="d-flex justify-content-center align-items-center vh-100" style={{ background: '#fff' }}><div className="spinner-border" style={{ width: '3rem', height: '3rem', color: '#01a54f' }}></div></div>;

  return (
    <>
      <style>{`
        :root {
          --deep-green: #2a6a59;
          --mid-green: #01a54f;
          --green-text: #0a6e3a;
          --gold: #e5aa39;
          --gold-deep: #a9760f;
          --light-green: #7fc241;
          --bg: #ffffff;
          --tint: #f5faf6;
          --ink: #384741;
          --ink-soft: #708078;
          --line: #ebe8e0;
          --line-soft: #f1efe9;
          --stop: #d2664f;
          --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
          --font-body: 'Inter', system-ui, -apple-system, sans-serif;
          --bs-primary: #01a54f;
          --bs-primary-rgb: 1, 165, 79;
        }

        html { scroll-padding-top: 6.5rem; }
        body { background-color: var(--bg); color: var(--ink); font-family: var(--font-body); }
        @media (max-width: 991.98px) { body { padding-bottom: 4.6rem; } }
        .app-fade { animation: appIn 0.5s ease; }
        @keyframes appIn { from { opacity: 0; } to { opacity: 1; } }
        h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); font-optical-sizing: auto; color: var(--deep-green); }
        .text-muted { color: var(--ink-soft) !important; }
        a { color: var(--mid-green); text-underline-offset: 2px; }

        /* ---------- Sticky topbar ---------- */
        .topbar { position: sticky; top: 0; z-index: 1030; background: rgba(255,255,255,0.82); backdrop-filter: saturate(180%) blur(14px); -webkit-backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid var(--line); }
        .gold-rule { height: 2px; background: linear-gradient(90deg, var(--gold) 0%, var(--light-green) 55%, var(--mid-green) 100%); }
        .topbar-inner { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; }
        .brand-wrap { flex: 1 1 0; min-width: 0; }
        .brand-eyebrow { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin: 0 0 0.1rem; }
        .brand-title { font-family: var(--font-display); font-weight: 600; font-size: clamp(1.02rem, 1.9vw, 1.3rem); color: var(--deep-green); line-height: 1.1; margin: 0; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .reset-wrap { flex: 1 1 0; display: flex; justify-content: flex-end; }
        .btn-ghost { background: #fff; border: 1px solid var(--line); color: var(--ink-soft); border-radius: 2rem; padding: 0.45rem 1.05rem; font-size: 0.82rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
        .btn-ghost:hover { border-color: var(--light-green); color: var(--deep-green); }

        /* step tracker in header */
        .step-track { display: flex; align-items: center; gap: 0.6rem; flex: 0 0 auto; }
        .schip { display: inline-flex; align-items: center; gap: 0.45rem; font-size: 0.8rem; font-weight: 600; color: var(--ink-soft); transition: color 0.3s; }
        .schip .dot { width: 1.45rem; height: 1.45rem; border-radius: 50%; display: grid; place-items: center; border: 1.5px solid var(--line); font-size: 0.72rem; transition: all 0.3s; background: #fff; }
        .schip.active { color: var(--deep-green); }
        .schip.active .dot { border-color: var(--mid-green); color: var(--mid-green); }
        .schip.done { color: var(--green-text); }
        .schip.done .dot { background: var(--mid-green); border-color: var(--mid-green); color: #fff; }
        .schip-line { width: 2rem; height: 1.5px; background: var(--line); border-radius: 2px; }

        /* ---------- Hero ---------- */
        .hero { padding: 2.8rem 0 2.4rem; }
        .hero-kicker { text-transform: uppercase; letter-spacing: 0.16em; font-size: 0.7rem; font-weight: 600; color: var(--gold-deep); margin: 0 0 0.85rem; display: flex; align-items: center; gap: 0.55rem; }
        .hero-title { font-weight: 600; font-size: clamp(2rem, 4.4vw, 3rem); line-height: 1.06; letter-spacing: -0.02em; color: var(--deep-green); margin: 0 0 0.9rem; }
        .hero-title .it { font-style: italic; color: var(--mid-green); }
        .hero-sub { color: var(--ink-soft); font-size: clamp(1rem, 1.5vw, 1.1rem); max-width: none; line-height: 1.65; margin: 0; }

        /* ---------- Step headers ---------- */
        .step-head { display: flex; align-items: center; gap: 1.1rem; margin-bottom: 1.6rem; padding-bottom: 1rem; border-bottom: 1px solid var(--line); }
        .step-num { font-family: var(--font-display); font-weight: 500; font-size: 1.45rem; color: var(--deep-green); width: 2.9rem; height: 2.9rem; flex: 0 0 auto; border: 1.5px solid var(--gold); border-radius: 50%; display: grid; place-items: center; background: #fff; }
        .step-num.s2 { border-color: var(--light-green); color: var(--deep-green); }
        .step-head h2 { font-weight: 600; font-size: clamp(1.3rem, 2.5vw, 1.8rem); margin: 0; letter-spacing: -0.01em; }

        /* ---------- Panels ---------- */
        .panel { background: #fff; border: 1px solid var(--line); border-radius: 1.15rem; box-shadow: 0 1px 2px rgba(40,71,61,0.03), 0 18px 38px -30px rgba(40,71,61,0.16); padding: 1.6rem 1.7rem; margin-bottom: 1.4rem; transition: border-color 0.25s ease, box-shadow 0.25s ease; }
        .panel:hover { border-color: #e0ddd2; box-shadow: 0 1px 2px rgba(40,71,61,0.04), 0 22px 44px -30px rgba(40,71,61,0.22); }
        .panel-title { font-family: var(--font-body); font-weight: 600; font-size: 1.08rem; color: var(--deep-green); margin: 0; display: flex; align-items: center; gap: 0.7rem; letter-spacing: -0.005em; }
        .panel-cap { color: var(--ink-soft); font-size: 0.9rem; margin: 0.55rem 0 1.1rem; line-height: 1.55; }

        /* legal progress meter */
        .legal-meter { display: flex; align-items: center; gap: 0.85rem; margin: 0.2rem 0 1.3rem; }
        .lm-track { flex: 1; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
        .lm-fill { height: 100%; border-radius: 3px; background: var(--mid-green); transition: width 0.45s ease, background 0.3s; }
        .lm-fill.concern { background: var(--stop); }
        .lm-caption { font-size: 0.76rem; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
        .lm-caption.ok { color: var(--green-text); }

        /* ---------- Callouts ---------- */
        .callout { background: var(--tint); border: 1px solid var(--line-soft); border-left: 3px solid var(--light-green); border-radius: 0.7rem; padding: 1rem 1.2rem; font-size: 0.92rem; color: var(--ink); line-height: 1.65; margin-bottom: 1.5rem; display: flex; gap: 0.8rem; }
        .callout.amber { background: #fdfaf2; border-left-color: var(--gold); }
        .callout i { color: var(--mid-green); margin-top: 0.1rem; }
        .callout.amber i { color: var(--gold-deep); }
        .callout b { font-family: var(--font-display); font-weight: 600; color: var(--deep-green); }

        /* ---------- Check items ---------- */
        .check-item { display: flex; align-items: flex-start; gap: 0.85rem; padding: 0.95rem 1.05rem; border: 1px solid var(--line); border-radius: 0.7rem; background: #fff; margin-bottom: 0.7rem; cursor: pointer; transition: border-color 0.18s, background 0.18s; }
        .check-item:hover { border-color: var(--light-green); background: #fbfdf9; }
        .check-item.checked { border-color: rgba(1,165,79,0.45); background: rgba(1,165,79,0.04); }
        .check-item:focus-visible { outline: 3px solid rgba(1,165,79,0.28); outline-offset: 2px; }
        .cbox { width: 1.3rem; height: 1.3rem; border: 1.6px solid #cdd6cf; border-radius: 0.35rem; flex: 0 0 auto; margin-top: 0.1rem; display: grid; place-items: center; transition: all 0.18s; background: #fff; }
        .check-item.checked .cbox { background: var(--mid-green); border-color: var(--mid-green); }
        .cbox::after { content: ''; width: 0.34rem; height: 0.64rem; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg) translateY(-1px) scale(0); transition: transform 0.2s cubic-bezier(.2,.9,.3,1.2); }
        .check-item.checked .cbox::after { transform: rotate(45deg) translateY(-1px) scale(1); }
        .check-label { color: var(--ink); font-weight: 450; line-height: 1.5; font-size: 0.96rem; }
        .check-item a { color: var(--mid-green); }

        /* ---------- Radio options ---------- */
        .radio-box input[type="radio"] { display: none; }

                      </div>
                      <div className="form-floating mb-4">
                        <input type="text" className="form-control" id="floatingEtab" value={meta.etablissement} onChange={e => setMeta({ ...meta, etablissement: e.target.value })} placeholder="Établissement" />
                        <label htmlFor="floatingEtab">Établissement <span className="text-muted">(facultatif)</span></label>
                      </div>

                      <div className="mention-box p-4 mb-3">
                        <div ref={copyAreaRef} style={{ fontFamily: 'Georgia, serif', fontSize: '13.5px', color: '#333', lineHeight: '1.55' }}>
                          <p style={{ margin: '0 0 8px 0' }}>Pour citer cette ressource :</p>
                          <div style={{ display: 'flex', gap: '12px', alignItems: 'flex-start' }}>
                            {logoOk && (
                              <img src={badgeUrl(licInfo.code)} alt={`Licence CC ${licenseCode}`} style={{ height: '31px', flex: '0 0 auto', marginTop: '2px' }} onError={() => setLogoOk(false)} />
                            )}
                            <p style={{ margin: 0 }}>
                              {(meta.author.trim() || '[Auteur]')}{endDot(meta.author.trim() || '[Auteur]')}({meta.year.trim() || '[Année]'}). <em>{meta.title.trim() || '[Titre]'}</em>{endDot(meta.title.trim() || '[Titre]')}{affiliation() ? affiliation() + endDot(affiliation()) : ''}Sous licence <a href={deedUrl(licInfo.code)} target="_blank" rel="noopener noreferrer">CC {licenseCode} 4.0</a>.
                            </p>
                          </div>
                        </div>
                      </div>

                      <button onClick={copyToClipboard} className={`btn w-100 fw-bold py-2 ${copied ? 'btn-success' : 'btn-primary-custom'}`}>
                        {copied ? <><i className="bi bi-check2-all me-2"></i>Copié avec succès</> : <><i className="bi bi-clipboard me-2"></i>Copier la mention{logoOk ? ' avec logo' : ''}</>}
                      </button>
                      <p className="text-muted small text-center mt-3 mb-0">
                        Licence <strong>irrévocable</strong>. Outil officiel : <a href="https://creativecommons.org/chooser/" target="_blank" rel="noopener noreferrer">creativecommons.org/chooser</a>
                      </p>
                    </div>
                  </div>
                )}

              </div>
            </div>
          </div>
        </div>

        {/* Pied de page discret */}
        <footer className="app-footer">
          <div className="container">
            <a href="mailto:alexandra.lez@usherbrooke.ca">alexandra.lez@usherbrooke.ca</a><span className="ver"> · Version 2.0</span>
          </div>
        </footer>

        {/* Barre de statut mobile (sticky) */}
        <div className="mobile-status d-lg-none">
          <span className={`ms-dot ${verdictStatus} ${verdictStatus !== 'neutral' ? 'on' : ''}`}></span>
          <div className="ms-text">
            {showLicense ? `Licence : CC ${licenseCode}` : verdictData.title}
            <small>{showLicense ? 'Mention prête à copier' : (legalClear ? 'Aspects légaux réglés' : `${legalOui} / ${LEGAL_ITEMS.length} aspects légaux`)}</small>
          </div>
          {showLicense ? (
            <button className="ms-btn" onClick={() => sideRef.current?.scrollIntoView({ behavior: 'smooth' })}>Voir</button>
          ) : step2Ready ? (
            <button className="ms-btn" onClick={() => part2Ref.current?.scrollIntoView({ behavior: 'smooth' })}>Étape 2</button>
          ) : null}
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
