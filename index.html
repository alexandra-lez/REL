const { useState, useEffect, useRef } = React;

const THEMES = {
  potentiel: { id: 'potentiel', title: "Potentiel de réutilisation", desc: "Plus vous cochez, plus la ressource gagne en valeur partagée. Rien n'est obligatoire.", items: [
      { id: 'p1', label: "Adaptation rapide possible par un tiers." },
      { id: 'p2', label: "Apporte une réelle nouveauté (outil, méthode, donnée)." },
      { id: 'p3', label: "Le contenu est durable dans le temps." },
      { id: 'p4', label: "Fichiers sources dans des formats ouverts/répandus." }
  ]},
  qualite: { id: 'qualite', title: "Qualité", desc: "Le niveau de finition attendu dépend de l'usage visé.", items: [
      { id: 'q1', label: "Relecture critique effectuée par un(e) pair." },
      { id: 'q2', label: "Ressource aboutie et utile en l'état." },
      { id: 'q3', label: "Versionnage prévu pour les mises à jour." },
      { id: 'q4', label: <>Respect des <a href="https://zenodo.org/records/14963025" target="_blank" rel="noopener noreferrer">Balises éditoriales du SSF</a>.</> }
  ]},
  rayon: { id: 'rayon', title: "Rayonnement", desc: "Ce que le partage fait gagner, au-delà de la ressource elle-même.", items: [
      { id: 'r1', label: "Contribue à la réputation de l'auteur et de l'UdeS." },
      { id: 'r2', label: "Inspire plus largement la communauté éducative." }
  ]}
};

const LEGAL_ITEMS = [
  { id: 'droit', label: "Propriété intellectuelle", desc: <>Respecte la Loi canadienne sur le droit d'auteur et la <a href="https://www.usherbrooke.ca/decouvrir/fileadmin/sites/decouvrir/documen[...]
  { id: 'licence', label: "Compatibilité des licences", desc: "Les contenus tiers intégrés permettent la diffusion sous CC BY." },
  { id: 'ethique', label: "Éthique et sensibilité", desc: "Absence de données sensibles ou enjeux validés." },
  { id: 'consent', label: "Consentements", desc: "Obtenus pour les collaborations ou captations." }
];

const LICENSES = {
  'BY': { full: 'Attribution 4.0 International', code: 'by', reco: true, allows: "Réutilisation totale, y compris commerciale, si l'auteur est crédité." },
  'BY-SA': { full: 'Attribution – Partage dans les mêmes conditions 4.0', code: 'by-sa', reco: true, allows: "Les œuvres dérivées doivent obligatoirement porter cette même licence." },
  'BY-NC': { full: 'Attribution – Pas d’utilisation commerciale 4.0', code: 'by-nc', reco: false, allows: "L'usage commercial est strictement interdit." },
  'BY-NC-SA': { full: 'Attribution – Non commercial – Partage identique 4.0', code: 'by-nc-sa', reco: false, allows: "Pas d'usage commercial, les dérivés sous même licence." },
  'BY-ND': { full: 'Attribution – Pas de modification 4.0', code: 'by-nd', reco: false, allows: "L'œuvre doit être partagée telle quelle, sans aucune adaptation." },
  'BY-NC-ND': { full: 'Attribution – Non commercial – Non dérivé 4.0', code: 'by-nc-nd', reco: false, allows: "La plus stricte : ni modification, ni commercialisation." }
};

const deedUrl = (code) => `https://creativecommons.org/licenses/${code}/4.0/deed.fr`;
// Badge officiel en PNG. Pour une fiabilité maximale au déploiement, vous pouvez
// héberger les 6 PNG dans votre dépôt et remplacer cette base par un chemin local
// (ex. `/badges/${code}.png`) : même origine = intégration garantie à la copie.
const badgeUrl = (code) => `https://licensebuttons.net/l/${code}/4.0/88x31.png`;
const escHtml = (s) => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

function App() {
  const [isLoaded, setIsLoaded] = useState(false);
  const [checks, setChecks] = useState({});
  const [legal, setLegal] = useState({ droit: null, licence: null, ethique: null, consent: null });
  const [verdictStatus, setVerdictStatus] = useState('neutral');

  const [ans, setAns] = useState({ rights: null, adapt: null, sa: null, nc: null });
  const [meta, setMeta] = useState({ title: '', author: '', year: new Date().getFullYear().toString() });
  const [copied, setCopied] = useState(false);
  const [citationFormat, setCitationFormat] = useState('standard');
  const [logoOk, setLogoOk] = useState(true);

  const part2Ref = useRef(null);
  const sideRef = useRef(null);
  const copyAreaRef = useRef(null);

  useEffect(() => {
    const urls = [
      'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;450;500;600;700&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css',
      'https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css'
    ];
    const links = urls.map(href => {
      const l = document.createElement('link');
      l.rel = 'stylesheet'; l.href = href;
      document.head.appendChild(l);
      return l;
    });
    const t = setTimeout(() => setIsLoaded(true), 380);
    return () => { clearTimeout(t); links.forEach(l => { try { document.head.removeChild(l); } catch (e) {} }); };
  }, []);

  const toggleCheck = (id) => setChecks(prev => ({ ...prev, [id]: !prev[id] }));
  const setLegalItem = (id, val) => setLegal(prev => ({ ...prev, [id]: val }));

  useEffect(() => {
    const vals = Object.values(legal);
    const touched = vals.some(v => v !== null) || Object.values(checks).some(v => v);
    const concern = vals.some(v => v === 'non' || v === 'verifier');
    const allOui = vals.every(v => v === 'oui');
    const count = (themeId) => THEMES[themeId].items.filter(i => checks[i.id]).length;
    if (!touched) setVerdictStatus('neutral');
    else if (concern) setVerdictStatus('red');
    else if (!allOui) setVerdictStatus('yellow');
    else if (count('qualite') >= 2 && count('potentiel') >= 1) setVerdictStatus('green');
    else setVerdictStatus('yellow');
  }, [checks, legal]);

  const legalOui = LEGAL_ITEMS.filter(i => legal[i.id] === 'oui').length;
  const legalConcern = LEGAL_ITEMS.some(i => legal[i.id] === 'non' || legal[i.id] === 'verifier');
  const legalClear = legalOui === LEGAL_ITEMS.length;

  const verdictData = {
    neutral: { icon: 'bi-compass', title: 'Aide à la décision', msg: 'Renseignez le formulaire pour évaluer votre ressource.', color: 'var(--ink-soft)' },
    red: { icon: 'bi-sign-stop', title: 'Arrêt requis', msg: 'Un aspect légal bloque le partage. Validez ces points avec la direction.', color: 'var(--stop)' },
    yellow: { icon: 'bi-hourglass-split', title: 'Attention', msg: 'Complétez les aspects légaux (tout « Oui »), ou améliorez la qualité de la ressource.', color: 'var(--gold-deep)' },
    green: { icon: 'bi-check2-circle', title: 'Feu vert', msg: "Aspects légaux respectés et ressource solide. Vous pouvez passer à l'étape 2.", color: 'var(--green-text)' }
  }[verdictStatus];

  const handleAns = (q, val) => setAns(prev => {
    const next = { ...prev, [q]: val };
    if (q === 'adapt' && val === 'non') next.sa = null;
    return next;
  });

  const computeLicense = () => {
    if (ans.adapt === 'non') return ans.nc === 'oui' ? 'BY-NC-ND' : 'BY-ND';
    if (ans.adapt === 'oui') {
      if (ans.nc === 'oui' && ans.sa === 'oui') return 'BY-NC-SA';
      if (ans.nc === 'oui') return 'BY-NC';
      if (ans.sa === 'oui') return 'BY-SA';
      return 'BY';
    }
    return null;
  };

  const isPart2Ready = () => ans.rights && ans.adapt && ans.nc !== null && (ans.adapt === 'non' || ans.sa !== null);
  const licenseCode = computeLicense();
  const licInfo = licenseCode ? LICENSES[licenseCode] : null;
  const showLicense = legalClear && isPart2Ready() && licInfo;

  const resetAll = () => {
    setChecks({});
    setLegal({ droit: null, licence: null, ethique: null, consent: null });
    setAns({ rights: null, adapt: null, sa: null, nc: null });
    setMeta(m => ({ ...m, title: '', author: '' }));
    setCopied(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // Construit la mention (HTML + texte) à partir de l'état courant.
  const buildMention = (logoHtml) => {
    const t = meta.title.trim() || '[Titre]';
    const a = meta.author.trim() || '[Auteur]';
    const y = meta.year.trim() || '[Année]';
    const url = deedUrl(licInfo.code);
    let html, text;
    if (citationFormat === 'standard') {
      html = `<p style="font-family:Georgia,serif;font-size:13.5px;color:#333;line-height:1.55;margin:0 0 8px">« <strong>${escHtml(t)}</strong> » © ${escHtml(y)} par ${escHtml(a)} est mis à d[...]
      text = `« ${t} » © ${y} par ${a} est mis à disposition selon les termes de la licence Creative Commons ${licInfo.full} (CC ${licenseCode}). ${url}`;
    } else {
      html = `<p style="font-family:Georgia,serif;font-size:13.5px;color:#333;line-height:1.55;margin:0 0 8px">${escHtml(a)}. (${escHtml(y)}). <em>${escHtml(t)}</em>. Licence Creative Commons ${l[...]
      text = `${a}. (${y}). ${t}. Licence Creative Commons ${licInfo.full} (CC ${licenseCode}). ${url}`;
    }
    return { html: html + (logoHtml || ''), text };
  };

  const blobToDataURL = (blob) => new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = reject;
    fr.readAsDataURL(blob);
  });

  const copyToClipboard = async () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 3000); };

    // 1. Tente de récupérer le badge PNG et de l'intégrer en data-URI (image embarquée).
    let logoHtml = '';
    let pngBlob = null;
    if (logoOk) {
      try {
        const res = await fetch(badgeUrl(licInfo.code), { mode: 'cors' });
        if (res.ok) {
          pngBlob = await res.blob();
          const dataUri = await blobToDataURL(pngBlob);
          logoHtml = `<img src="${dataUri}" alt="Licence CC ${licenseCode}" style="height:31px;display:block">`;
        }
      } catch (e) {
        // Téléchargement bloqué (CORS/hors ligne) : on retombe sur la référence distante.
        logoHtml = `<img src="${badgeUrl(licInfo.code)}" alt="Licence CC ${licenseCode}" style="height:31px;display:block">`;
        pngBlob = null;
      }
    }

    const { html, text } = buildMention(logoHtml);

    // 2. Écrit dans le presse-papiers : HTML enrichi + texte + (si dispo) image PNG.
    if (navigator.clipboard && window.ClipboardItem && window.isSecureContext) {
      try {
        const types = {
          'text/html': new Blob([html], { type: 'text/html' }),
          'text/plain': new Blob([text], { type: 'text/plain' })
        };
        if (pngBlob) types['image/png'] = pngBlob;
        await navigator.clipboard.write([new ClipboardItem(types)]);
        return done();
      } catch (e) { /* repli ci-dessous */ }
    }

    // 3. Repli : sélection visuelle de l'aperçu + execCommand.
    if (copyAreaRef.current) {
      const range = document.createRange();
      range.selectNodeContents(copyAreaRef.current);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      try { document.execCommand('copy') ? done() : alert("Sélectionnez le texte et copiez-le manuellement (Ctrl+C)."); }
      catch (e) { alert("Sélectionnez le texte et copiez-le manuellement (Ctrl+C)."); }
      sel.removeAllRanges();
    }
  };

  if (!isLoaded) return <div className="d-flex justify-content-center align-items-center vh-100" style={{ background: '#fff' }}><div className="spinner-border" style={{ width: '3rem', height: '3r[...]

  return (
    <>

        h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); font-optical-sizing: auto; color: var(--deep-green); }
        .text-muted { color: var(--ink-soft) !important; }

        /* ---------- Sticky topbar ---------- */
